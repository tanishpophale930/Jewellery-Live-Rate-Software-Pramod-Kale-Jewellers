services:
  prklivesoftwarebackend:
    build:
      context: .
    image: prk-live-rates-backend:latest
    ports:
      - "${HOST_PORT:-10000}:${SERVER_PORT:-10000}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-10000}
      AIB_TOKEN: ${AIB_TOKEN}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      AIB_TIMEOUT_SECONDS: ${AIB_TIMEOUT_SECONDS:-10}
      AIB_CONNECT_TIMEOUT_MILLIS: ${AIB_CONNECT_TIMEOUT_MILLIS:-5000}
      AIB_CACHE_TTL_SECONDS: ${AIB_CACHE_TTL_SECONDS:-30}
      AIB_STALE_IF_ERROR_SECONDS: ${AIB_STALE_IF_ERROR_SECONDS:-300}
      AIB_MAX_RETRIES: ${AIB_MAX_RETRIES:-2}
      AIB_RETRY_BACKOFF_MILLIS: ${AIB_RETRY_BACKOFF_MILLIS:-300}
