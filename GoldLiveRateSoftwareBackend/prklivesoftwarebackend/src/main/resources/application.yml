spring:
  application:
    name: prklivesoftwarebackend
  lifecycle:
    timeout-per-shutdown-phase: 20s

aib:
  url: https://allindiabullion.com/gold-rate/maharashtra/nagpur
  cookie-name: aib_tok
  cookie-value: ${AIB_TOKEN:}
  timeout-seconds: ${AIB_TIMEOUT_SECONDS:10}
  connect-timeout-millis: ${AIB_CONNECT_TIMEOUT_MILLIS:5000}
  cache-ttl-seconds: ${AIB_CACHE_TTL_SECONDS:30}
  stale-if-error-seconds: ${AIB_STALE_IF_ERROR_SECONDS:300}
  max-retries: ${AIB_MAX_RETRIES:2}
  retry-backoff-millis: ${AIB_RETRY_BACKOFF_MILLIS:300}
  user-agent: ${AIB_USER_AGENT:PRK-Live-Rates-Backend/1.0}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

server:
  port: ${PORT:${SERVER_PORT:10000}}
  address: 0.0.0.0
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

